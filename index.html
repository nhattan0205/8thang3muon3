```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:white;
overflow:hidden;
font-family:'Dancing Script',cursive;
}

/* phong bì */

.envelope{
width:520px;
height:340px;
position:relative;
cursor:pointer;
}

/* thân */

.base{
position:absolute;
width:100%;
height:100%;
background:white;
border:2px solid #ff9ac1;
border-radius:12px;
}

/* nắp */

.flap{
position:absolute;
width:100%;
height:170px;
background:#ffe6ef;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
z-index:3;
}

/* tờ giấy */

.paper{
position:absolute;
width:90%;
height:90%;
background:white;
left:5%;
top:55%;
border-radius:10px;
padding:40px;
box-sizing:border-box;
text-align:center;
transition:1.6s;
border:1px solid #ffd6e4;
}

/* mở thiệp */

.open .flap{
transform:rotateX(180deg);
}

.open .paper{
top:-120px;
}

/* tiêu đề */

.title{
font-family:'Great Vibes',cursive;
font-size:46px;
color:#ff4f8b;
margin-bottom:10px;
}

/* chữ */

.text{
font-size:26px;
color:#ff6fa1;
line-height:40px;
min-height:120px;
}

/* bó hoa pop up */

.bouquet{
font-size:70px;
transform:scale(0);
transition:1s;
margin:10px 0;
}

.open .bouquet{
transform:scale(1);
}

/* tim bay */

.heart{
position:absolute;
font-size:28px;
animation:fly 3s linear forwards;
}

@keyframes fly{
0%{transform:translateY(0)}
100%{transform:translateY(-600px);opacity:0}
}

/* hoa rơi */

.fall{
position:absolute;
top:-50px;
font-size:26px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="envelope" id="card">

<div class="flap"></div>

<div class="base"></div>

<div class="paper">

<div class="title">Xuân Tiên 💖</div>

<div class="bouquet">💐🌹🌸</div>

<div class="text" id="text"></div>

</div>

</div>

<script>

let message=`Chúc Xuân Tiên một ngày 8/3 thật vui vẻ,
luôn tươi như hoa và hạnh phúc mỗi ngày.

Nếu thế giới có 10 thiên thần
thì một thiên thần đang đọc
tấm thiệp này đó 💗`

let i=0
let opened=false

let card=document.getElementById("card")

card.onclick=function(){

if(opened) return
opened=true

card.classList.add("open")

createHearts()

setTimeout(typeWriter,1600)

}

/* chữ hiện */

function typeWriter(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i)

i++

setTimeout(typeWriter,40)

}

}

/* tim bay */

function createHearts(){

for(let i=0;i<20;i++){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.bottom="0px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),3000)

}

}

/* hoa rơi */

function createFall(){

let item=document.createElement("div")

item.className="fall"

let icons=["🌸","🌺","💮","💗"]

item.innerHTML=icons[Math.floor(Math.random()*icons.length)]

item.style.left=Math.random()*100+"vw"

item.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(item)

setTimeout(()=>item.remove(),8000)

}

setInterval(createFall,300)

</script>

</body>
</html>
